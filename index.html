<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCL — Institutional & Gifting Enquiry</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;--blue-mid:#378ADD;
    --green-bg:#EAF3DE;--green-border:#C0DD97;--green-text:#3B6D11;
    --orange-bg:#FAEEDA;--orange-text:#633806;
    --red:#E24B4A;
    --bg:#F7F8FA;--card:#FFFFFF;--border:#E2E6EA;--border-light:#EEF0F3;
    --text:#1A1D23;--text2:#52596B;--text3:#9AA0AD;
    --radius:10px;--radius-sm:7px;--shadow:0 2px 12px rgba(0,0,0,.07);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* HEADER */
  .app-header{background:var(--blue-dark);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .app-header .logo{background:#fff;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:700;color:var(--blue-dark);letter-spacing:.5px}
  .app-header h1{color:#fff;font-size:16px;font-weight:500}
  .app-header .spacer{flex:1}
  .header-badge{background:rgba(255,255,255,.15);color:#fff;font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.25)}

  /* LAYOUT */
  .container{max-width:780px;margin:0 auto;padding:24px 16px 60px}

  /* TABS */
  .tab-row{display:flex;gap:8px;margin-bottom:20px;background:var(--card);border-radius:var(--radius);padding:6px;box-shadow:var(--shadow)}
  .tab{flex:1;padding:9px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
  .tab.active{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(24,95,165,.3)}
  .tab .badge{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;font-size:11px}
  .tab:not(.active) .badge{background:var(--border-light);color:var(--text3)}

  /* CARD */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;border:0.5px solid var(--border)}

  /* SOURCE TOGGLE */
  .source-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .toggle-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
  .toggle-btn{padding:14px 12px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;text-align:center}
  .toggle-btn i{font-size:22px;display:block;margin-bottom:6px;color:var(--text3)}
  .toggle-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark)}
  .toggle-btn.active i{color:var(--blue)}

  /* SECTION HEADING */
  .sec-head{display:flex;align-items:center;gap:8px;margin:20px 0 14px}
  .sec-head .sec-icon{width:28px;height:28px;background:var(--blue-light);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:15px;flex-shrink:0}
  .sec-head span{font-size:13px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.05em}
  .sec-divider{flex:1;height:1px;background:var(--border-light)}

  /* FIELDS */
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field-grid.cols-1{grid-template-columns:1fr}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.span2{grid-column:1/-1}
  .field label{font-size:13px;color:var(--text2);font-weight:500}
  .field label .opt{font-size:11px;color:var(--text3);font-weight:400;margin-left:4px}
  .req{color:var(--red);margin-left:2px}
  .field input,.field select,.field textarea{
    border-radius:var(--radius-sm);border:1px solid var(--border);
    background:#fff;color:var(--text);font-size:14px;padding:9px 12px;width:100%;
    transition:border .15s,box-shadow .15s;font-family:inherit
  }
  .field input::placeholder,.field textarea::placeholder{color:var(--text3)}
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:var(--blue-mid);box-shadow:0 0 0 3px var(--blue-light)
  }
  .field textarea{resize:vertical;min-height:76px}
  .field input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(226,75,74,.1)}

  /* MULTI-SELECT DROPDOWN */
  .ms-wrap{position:relative}
  .ms-trigger{
    display:flex;align-items:center;justify-content:space-between;
    padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);
    background:#fff;cursor:pointer;min-height:40px;gap:8px;user-select:none;
    transition:border .15s,box-shadow .15s
  }
  .ms-trigger:hover{border-color:var(--blue-mid)}
  .ms-trigger.open{border-color:var(--blue-mid);box-shadow:0 0 0 3px var(--blue-light);border-radius:var(--radius-sm) var(--radius-sm) 0 0}
  .ms-tags{display:flex;flex-wrap:wrap;gap:4px;flex:1}
  .ms-placeholder{font-size:14px;color:var(--text3)}
  .ms-tag{background:var(--blue-light);color:var(--blue-dark);border-radius:5px;padding:2px 8px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px}
  .ms-tag-x{cursor:pointer;font-size:15px;line-height:1;color:var(--blue-mid)}
  .ms-tag-x:hover{color:var(--blue-dark)}
  .ms-arrow{font-size:16px;color:var(--text3);transition:transform .15s;flex-shrink:0}
  .ms-arrow.open{transform:rotate(180deg)}
  .ms-dropdown{
    position:absolute;top:100%;left:0;right:0;
    background:#fff;border:1px solid var(--blue-mid);border-top:none;
    border-radius:0 0 var(--radius-sm) var(--radius-sm);
    z-index:200;box-shadow:0 6px 16px rgba(0,0,0,.1);
    max-height:230px;overflow-y:auto;display:none
  }
  .ms-dropdown.open{display:block}
  .ms-option{
    display:flex;align-items:center;gap:10px;padding:10px 12px;
    cursor:pointer;font-size:14px;color:var(--text);
    transition:background .1s;border-bottom:0.5px solid var(--border-light)
  }
  .ms-option:last-child{border-bottom:none}
  .ms-option:hover{background:var(--bg)}
  .ms-option.sel{background:var(--blue-light)}
  .ms-option.special{color:var(--text2);font-style:italic}
  .ms-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff}
  .ms-option.sel .ms-check{background:var(--blue);border-color:var(--blue)}
  .ms-check i{color:#fff;font-size:12px;display:none}
  .ms-option.sel .ms-check i{display:block}
  .ms-short{font-size:11px;color:var(--text3);margin-left:auto;flex-shrink:0}
  .ms-option.sel .ms-short{color:var(--blue-mid)}
  .ms-divider-line{height:1px;background:var(--border);margin:2px 0}

  /* OCCASION BADGES */
  .badge-row{display:flex;flex-wrap:wrap;gap:8px}
  .badge{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
  .badge:hover{border-color:var(--blue-mid);color:var(--blue)}
  .badge.sel{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark);font-weight:500}

  /* SUBMIT */
  .submit-btn{
    width:100%;margin-top:20px;padding:14px;border-radius:var(--radius);
    border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:600;
    cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 4px 12px rgba(24,95,165,.3)
  }
  .submit-btn:hover{background:var(--blue-dark);transform:translateY(-1px);box-shadow:0 6px 16px rgba(24,95,165,.35)}
  .submit-btn:active{transform:translateY(0)}
  .submit-btn:disabled{background:var(--text3);box-shadow:none;cursor:not-allowed;transform:none}

  /* TOAST */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:#1C2B1A;color:#fff;padding:12px 20px;border-radius:var(--radius);
    font-size:14px;display:flex;align-items:center;gap:10px;
    box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:9999;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.error-toast{background:#3B0F0F}
  .toast i{font-size:18px;color:#7FD67A}
  .toast.error-toast i{color:#FF8A8A}

  /* LIST VIEW */
  .list-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .list-count{font-size:14px;color:var(--text2);font-weight:500}
  .export-btn{
    display:flex;align-items:center;gap:6px;padding:9px 16px;
    border-radius:var(--radius-sm);border:1px solid var(--border);
    background:#fff;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;
    transition:all .15s;box-shadow:var(--shadow)
  }
  .export-btn:hover{background:var(--bg);border-color:var(--blue-mid);color:var(--blue)}

  .enq-card{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .enq-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
  .enq-id{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.05em}
  .enq-company{font-size:16px;font-weight:600;color:var(--text);margin-top:2px}
  .enq-via{font-size:13px;color:var(--text2);font-weight:400}
  .enq-date{font-size:12px;color:var(--text3);text-align:right}
  .enq-contact{font-size:13px;color:var(--text2);margin-bottom:10px;display:flex;flex-wrap:wrap;gap:12px}
  .enq-contact span{display:flex;align-items:center;gap:4px}
  .tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-bottom:8px}
  .tag-direct{background:var(--green-bg);color:var(--green-text)}
  .tag-dist{background:var(--orange-bg);color:var(--orange-text)}
  .pills{display:flex;flex-wrap:wrap;gap:6px}
  .pill{background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}
  .pill i{font-size:12px;color:var(--text3)}

  .empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
  .empty-state i{font-size:40px;display:block;margin-bottom:12px;color:var(--border)}
  .empty-state p{font-size:15px}

  /* SPINNER */
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:540px){
    .field-grid{grid-template-columns:1fr}
    .field.span2{grid-column:1}
    .toggle-row{grid-template-columns:1fr}
    .container{padding:16px 12px 60px}
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">BCL</div>
  <h1>Institutional &amp; Gifting Enquiry</h1>
  <div class="spacer"></div>
  <div class="header-badge"><i class="ti ti-shield-check" style="vertical-align:-2px;margin-right:4px"></i>Brand Concepts Ltd</div>
</div>

<div class="container">



  <!-- FORM PANE -->
  <div id="formPane">

    <div class="card">
      <div class="source-label">Enquiry source</div>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btn-direct" onclick="setType('direct')">
          <i class="ti ti-user-check"></i>Direct Enquiry
        </button>
        <button class="toggle-btn" id="btn-dist" onclick="setType('dist')">
          <i class="ti ti-users"></i>Via 3rd Party
        </button>
      </div>
    </div>

    <div class="card">
      <div class="sec-head">
        <div class="sec-icon"><i class="ti ti-building"></i></div>
        <span>Client Details</span>
        <div class="sec-divider"></div>
      </div>
      <div id="clientFields"></div>
    </div>

    <div class="card">
      <div class="sec-head">
        <div class="sec-icon"><i class="ti ti-tag"></i></div>
        <span>Brand &amp; Product Details</span>
        <div class="sec-divider"></div>
      </div>

      <div class="field" style="margin-bottom:12px">
        <label>Brand(s)<span class="req">*</span></label>
        <div class="ms-wrap" id="brandWrap">
          <div class="ms-trigger" id="msTrigger" onclick="toggleDropdown(event)">
            <div class="ms-tags" id="msTagsArea"><span class="ms-placeholder">Select one or more brands</span></div>
            <i class="ti ti-chevron-down ms-arrow" id="msArrow"></i>
          </div>
          <div class="ms-dropdown" id="msDropdown"></div>
        </div>
      </div>

      <div class="field-grid">
        <div class="field">
          <label>Category<span class="req">*</span></label>
          <select id="category" onchange="handleCategoryChange()">
            <option value="">Select category</option>
            <option>Luggage</option>
            <option>Backpack</option>
            <option>Belt</option>
            <option>Wallet</option>
            <option>Handbag</option>
            <option>Business Case</option>
            <option>Cross Body</option>
            <option>Gym Bag</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field" id="otherCategoryWrap" style="display:none">
          <label>Specify category<span class="req">*</span></label>
          <input type="text" id="otherCategory" placeholder="e.g. Duffel bag, Tote bag…">
        </div>
        <div class="field">
          <label>Product name<span class="opt">(optional)</span></label>
          <input type="text" id="productName" placeholder="e.g. TH Spinner 24">
        </div>
        <div class="field">
          <label>Size / Sizes<span class="opt">(optional)</span></label>
          <input type="text" id="productSize" placeholder="e.g. 20&quot;, 24&quot;, 28&quot; or S/M/L">
        </div>
        <div class="field">
          <label>Quantity required<span class="req">*</span></label>
          <input type="number" id="quantity" placeholder="e.g. 500" min="1">
        </div>
        <div class="field">
          <label>Budget range / MRP<span class="opt">(optional)</span></label>
          <input type="text" id="budget" placeholder="e.g. ₹1,500–₹2,000 per piece">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec-head">
        <div class="sec-icon"><i class="ti ti-gift"></i></div>
        <span>Requirement Details</span>
        <div class="sec-divider"></div>
      </div>

      <div class="field-grid" style="margin-bottom:14px">
        <div class="field">
          <label>Gifting occasion</label>
          <select id="occasionSelect" onchange="handleOccasionChange()">
            <option value="">Select occasion</option>
            <option>Diwali</option>
            <option>New Year</option>
            <option>Corporate milestone</option>
            <option>Employee welcome kit</option>
            <option>Customer appreciation</option>
            <option>Farewell</option>
            <option>Wedding</option>
            <option>Conference / event</option>
            <option>Birthday</option>
            <option>Anniversary</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field" id="otherOccasionWrap" style="display:none">
          <label>Specify occasion<span class="req">*</span></label>
          <input type="text" id="otherOccasion" placeholder="e.g. Product launch, Sports day…">
        </div>
      </div>

      <div class="field-grid">
        <div class="field">
          <label>Required delivery date<span class="req">*</span></label>
          <input type="date" id="deliveryDate">
        </div>
        <div class="field">
          <label>No. of delivery locations</label>
          <input type="number" id="deliveryLocCount" placeholder="e.g. 3" min="1">
        </div>
        <div class="field span2">
          <label>Delivery location(s)</label>
          <textarea id="deliveryLoc" placeholder="City / address / PIN code — add multiple if needed"></textarea>
        </div>
        <div class="field span2">
          <label>Special requirements<span class="opt">(branding, logo, packaging)</span></label>
          <textarea id="specialReq" placeholder="e.g. Logo on product, custom ribbon, gift box…"></textarea>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec-head">
        <div class="sec-icon"><i class="ti ti-user-circle"></i></div>
        <span>Enquiry Owner Details</span>
        <div class="sec-divider"></div>
      </div>
      <div class="field-grid">
        <div class="field">
          <label>Enquiry owner name<span class="req">*</span></label>
          <input type="text" id="salesName" placeholder="Full name">
        </div>
        <div class="field">
          <label>Region / channel<span class="req">*</span></label>
          <select id="channel">
            <option value="">Select channel</option>
            <option>E-Com B2B</option><option>E-Com B2C</option><option>LFRS</option>
            <option>Brand EBO</option><option>Govt/CSD</option><option>DND</option><option>Insti</option>
          </select>
        </div>
        <div class="field span2">
          <label>Reference<span class="opt">(how did this lead come in?)</span></label>
          <input type="text" id="reference" placeholder="e.g. Cold call, LinkedIn, Trade fair, Referral by Amit Sharma…">
        </div>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">
      <div class="spinner" id="submitSpinner"></div>
      <i class="ti ti-send" id="submitIcon"></i>
      <span id="submitText">Submit Enquiry</span>
    </button>

  </div>



</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="ti ti-circle-check"></i>
  <span id="toastMsg">Enquiry submitted successfully!</span>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/a/macros/brandconcepts.in/s/AKfycbyIF9TclW0iExJdHr4Yx34RXz28obhte8DusZ_nyULrL0YURDq_x4ROb0Y5WTwsoPje/exec';

const BRANDS = [
  {label:'Tommy Hilfiger', short:'TH', special:false},
  {label:'United Colors of Benetton', short:'UCB', special:false},
  {label:'Superdry', short:'SD', special:false},
  {label:'Juicy Couture', short:'JC', special:false},
  {label:'Aeropostale', short:'AP', special:false},
  {label:'Unbranded', short:'', special:true},
  {label:'Any Brand', short:'', special:true}
];

let enquiryType = 'direct';
let selBrands = [];
let enquiries = [];
let ddOpen = false;

// ── INIT ──
function init(){
  buildDropdown();
  buildClientFields();
}

// ── BRAND DROPDOWN ──
function buildDropdown(){
  const dd = document.getElementById('msDropdown');
  dd.innerHTML = '';
  BRANDS.forEach((b,i) => {
    if(b.special && i > 0 && !BRANDS[i-1].special){
      const div = document.createElement('div');
      div.className = 'ms-divider-line';
      dd.appendChild(div);
    }
    const opt = document.createElement('div');
    opt.className = 'ms-option' + (b.special ? ' special' : '');
    opt.id = 'opt-' + i;
    opt.innerHTML = `
      <div class="ms-check"><i class="ti ti-check"></i></div>
      <span style="flex:1">${b.label}</span>
      ${b.short ? `<span class="ms-short">${b.short}</span>` : ''}
    `;
    opt.onclick = e => { e.stopPropagation(); toggleBrand(b.label, i); };
    dd.appendChild(opt);
  });
}

function toggleBrand(label, idx){
  const opt = document.getElementById('opt-' + idx);
  if(selBrands.includes(label)){
    selBrands = selBrands.filter(x => x !== label);
    opt.classList.remove('sel');
  } else {
    selBrands.push(label);
    opt.classList.add('sel');
  }
  renderTags();
}

function renderTags(){
  const area = document.getElementById('msTagsArea');
  if(!selBrands.length){
    area.innerHTML = '<span class="ms-placeholder">Select one or more brands</span>';
  } else {
    area.innerHTML = selBrands.map(b =>
      `<span class="ms-tag">${b}<span class="ms-tag-x" onclick="removeBrand(event,'${b}')">×</span></span>`
    ).join('');
  }
}

function removeBrand(e, label){
  e.stopPropagation();
  const idx = BRANDS.findIndex(b => b.label === label);
  selBrands = selBrands.filter(x => x !== label);
  if(idx >= 0){ const o = document.getElementById('opt-'+idx); if(o) o.classList.remove('sel'); }
  renderTags();
}

function toggleDropdown(e){
  e.stopPropagation();
  ddOpen = !ddOpen;
  document.getElementById('msDropdown').classList.toggle('open', ddOpen);
  document.getElementById('msTrigger').classList.toggle('open', ddOpen);
  document.getElementById('msArrow').classList.toggle('open', ddOpen);
}

document.addEventListener('click', () => {
  if(ddOpen){
    ddOpen = false;
    document.getElementById('msDropdown').classList.remove('open');
    document.getElementById('msTrigger').classList.remove('open');
    document.getElementById('msArrow').classList.remove('open');
  }
});

// ── CATEGORY ──
function handleCategoryChange(){
  const sel = document.getElementById('category').value;
  const wrap = document.getElementById('otherCategoryWrap');
  wrap.style.display = sel === 'Other' ? 'flex' : 'none';
  if(sel !== 'Other') { const el = document.getElementById('otherCategory'); if(el) el.value=''; }
}

function getCategory(){
  const sel = document.getElementById('category').value;
  if(sel === 'Other') return document.getElementById('otherCategory').value.trim() || 'Other';
  return sel;
}

// ── OCCASIONS ──
function handleOccasionChange(){
  const sel = document.getElementById('occasionSelect').value;
  const wrap = document.getElementById('otherOccasionWrap');
  wrap.style.display = sel === 'Other' ? 'flex' : 'none';
  if(sel !== 'Other') document.getElementById('otherOccasion').value = '';
}

function getOccasion(){
  const sel = document.getElementById('occasionSelect').value;
  if(sel === 'Other') return document.getElementById('otherOccasion').value.trim() || 'Other';
  return sel;
}

// ── CLIENT FIELDS ──
function buildClientFields(){
  const c = document.getElementById('clientFields');
  if(enquiryType === 'direct'){
    c.innerHTML = `<div class="field-grid">
      <div class="field"><label>Company name / Person name<span class="req">*</span></label><input type="text" id="companyName" placeholder="e.g. Infosys Ltd or Rahul Sharma"></div>
      <div class="field"><label>Contact person<span class="req">*</span></label><input type="text" id="contactPerson" placeholder="Full name"></div>
      <div class="field"><label>Phone<span class="req">*</span></label><input type="tel" id="phone" placeholder="+91 XXXXX XXXXX"></div>
      <div class="field"><label>Email<span class="req">*</span></label><input type="email" id="email" placeholder="contact@company.com"></div>
      <div class="field"><label>City<span class="req">*</span></label><input type="text" id="city" placeholder="e.g. Mumbai"></div>
    </div>`;
  } else {
    c.innerHTML = `<div class="field-grid">
      <div class="field"><label>Company name<span class="opt">(if available)</span></label><input type="text" id="companyName" placeholder="End client company name"></div>
      <div class="field"><label>3rd party / agency name<span class="req">*</span></label><input type="text" id="distName" placeholder="Name of 3rd party or agency"></div>
      <div class="field"><label>Contact person<span class="req">*</span></label><input type="text" id="contactPerson" placeholder="Full name"></div>
      <div class="field"><label>Phone<span class="req">*</span></label><input type="tel" id="phone" placeholder="+91 XXXXX XXXXX"></div>
      <div class="field"><label>Email<span class="req">*</span></label><input type="email" id="email" placeholder="contact@agency.com"></div>
      <div class="field"><label>City<span class="req">*</span></label><input type="text" id="city" placeholder="e.g. Mumbai"></div>
    </div>`;
  }
}

function setType(t){
  enquiryType = t;
  document.getElementById('btn-direct').classList.toggle('active', t === 'direct');
  document.getElementById('btn-dist').classList.toggle('active', t === 'dist');
  buildClientFields();
}

// ── TAB SWITCH ──
function switchTab(tab){
  document.getElementById('tab-form').classList.toggle('active', tab === 'form');
  document.getElementById('tab-list').classList.toggle('active', tab === 'list');
  document.getElementById('formPane').style.display = tab === 'form' ? 'block' : 'none';
  document.getElementById('listPane').style.display = tab === 'list' ? 'block' : 'none';
  if(tab === 'list') renderList();
}

// ── HELPERS ──
function val(id){ const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function showToast(msg, isError){
  const t = document.getElementById('toast');
  const icon = t.querySelector('i');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.toggle('error-toast', !!isError);
  icon.className = isError ? 'ti ti-alert-circle' : 'ti ti-circle-check';
  icon.style.color = isError ? '#FF8A8A' : '#7FD67A';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── SUBMIT ──
async function submitForm(){
  const req = ['salesName','channel','deliveryDate','quantity','category'];
  const clientReq = enquiryType === 'direct'
    ? ['companyName','contactPerson','phone','email','city']
    : ['distName','contactPerson','phone','email','city'];

  let valid = true;
  for(const id of [...req, ...clientReq]){
    if(!val(id)){
      const el = document.getElementById(id);
      if(el){ el.classList.add('error'); el.focus(); setTimeout(() => el.classList.remove('error'), 2000); }
      valid = false; break;
    }
  }
  if(!valid) return;

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('submitSpinner');
  const icon = document.getElementById('submitIcon');
  const text = document.getElementById('submitText');

  btn.disabled = true;
  spinner.style.display = 'block';
  icon.style.display = 'none';
  text.textContent = 'Submitting…';

  const enq = {
    id: 'ENQ-' + String(enquiries.length + 1).padStart(3,'0'),
    submittedAt: new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}),
    type: enquiryType === 'direct' ? 'Direct' : 'Via 3rd Party',
    company: val('companyName') || '—',
    thirdParty: val('distName') || '',
    contact: val('contactPerson'),
    phone: val('phone'),
    email: val('email'),
    city: val('city'),
    brands: selBrands.join(' | '),
    category: getCategory(),
    productName: val('productName'),
    productSize: val('productSize'),
    quantity: val('quantity'),
    budget: val('budget'),
    occasion: getOccasion(),
    deliveryDate: val('deliveryDate'),
    deliveryLocCount: val('deliveryLocCount'),
    deliveryLoc: val('deliveryLoc'),
    specialReq: val('specialReq'),
    salesName: val('salesName'),
    channel: val('channel'),
    reference: val('reference')
  };

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(enq)
    });
    enquiries.push({...enq, brandsArr: selBrands.slice()});
    document.getElementById('enqCountBadge').textContent = enquiries.length;
    showToast('Enquiry ' + enq.id + ' submitted successfully!');
    resetForm();
  } catch(err){
    showToast('Submission failed. Please check your connection.', true);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    icon.style.display = '';
    text.textContent = 'Submit Enquiry';
  }
}

// ── RESET ──
function resetForm(){
  selBrands = [];
  buildClientFields(); buildDropdown(); renderTags();
  const oSel = document.getElementById('occasionSelect');
  if(oSel) oSel.value = '';
  const oWrap = document.getElementById('otherOccasionWrap');
  if(oWrap) oWrap.style.display = 'none';
  const oOther = document.getElementById('otherOccasion');
  if(oOther) oOther.value = '';
  const cWrap = document.getElementById('otherCategoryWrap');
  if(cWrap) cWrap.style.display = 'none';
  ['category','productName','productSize','otherCategory','quantity','budget','deliveryDate','deliveryLoc','deliveryLocCount','specialReq','salesName','channel','reference','otherOccasion']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
}

// ── LIST ──
function renderList(){
  const c = document.getElementById('enqList');
  const lbl = document.getElementById('listCountLabel');
  lbl.textContent = enquiries.length + ' enquir' + (enquiries.length === 1 ? 'y' : 'ies');
  if(!enquiries.length){
    c.innerHTML = `<div class="empty-state"><i class="ti ti-inbox"></i><p>No enquiries yet.<br>Submit one to see it here.</p></div>`;
    return;
  }
  c.innerHTML = enquiries.slice().reverse().map(e => `
    <div class="enq-card">
      <div class="enq-top">
        <div>
          <div class="enq-id">${e.id}</div>
          <div class="enq-company">${e.company}${e.thirdParty ? `<span class="enq-via"> via ${e.thirdParty}</span>` : ''}</div>
        </div>
        <div>
          <span class="tag ${e.type==='Direct'?'tag-direct':'tag-dist'}">${e.type}</span>
          <div class="enq-date">${e.submittedAt}</div>
        </div>
      </div>
      <div class="enq-contact">
        <span><i class="ti ti-user" style="font-size:13px"></i>${e.contact}</span>
        <span><i class="ti ti-phone" style="font-size:13px"></i>${e.phone}</span>
        <span><i class="ti ti-mail" style="font-size:13px"></i>${e.email}</span>
        <span><i class="ti ti-map-pin" style="font-size:13px"></i>${e.city}</span>
      </div>
      <div class="pills">
        ${e.brands ? `<span class="pill"><i class="ti ti-tag"></i>${e.brands}</span>` : ''}
        <span class="pill"><i class="ti ti-category"></i>${e.category}${e.productName?' · '+e.productName:''}</span>
        <span class="pill"><i class="ti ti-package"></i>Qty: ${e.quantity}</span>
        ${e.budget ? `<span class="pill"><i class="ti ti-currency-rupee"></i>${e.budget}</span>` : ''}
        ${e.occasion ? `<span class="pill"><i class="ti ti-gift"></i>${e.occasion}</span>` : ''}
        <span class="pill"><i class="ti ti-calendar"></i>${e.deliveryDate}</span>
        ${e.deliveryLoc ? `<span class="pill"><i class="ti ti-map"></i>${e.deliveryLoc}${e.deliveryLocCount?' ('+e.deliveryLocCount+' loc)':''}</span>` : ''}
        <span class="pill"><i class="ti ti-user-circle"></i>${e.salesName} · ${e.channel}</span>
        ${e.specialReq ? `<span class="pill" style="font-style:italic"><i class="ti ti-note"></i>${e.specialReq}</span>` : ''}
        ${e.reference ? `<span class="pill"><i class="ti ti-link"></i>Ref: ${e.reference}</span>` : ''}
      </div>
    </div>`).join('');
}

// ── EXPORT CSV ──
function exportCSV(){
  if(!enquiries.length){ alert('No enquiries to export yet.'); return; }
  const headers = ['Enquiry ID','Date','Source','Company / Person Name','3rd Party / Agency','Contact Person','Phone','Email','City','Brand(s)','Category','Product Name','Size / Sizes','Quantity','Budget / MRP','Gifting Occasion','Delivery Date','No. of Locations','Delivery Location(s)','Special Requirements','Enquiry Owner','Channel','Reference','Submitted On'];
  const rows = enquiries.map(e => [
    e.id, e.submittedAt, e.type, e.company, e.thirdParty, e.contact, e.phone, e.email, e.city,
    e.brands, e.category, e.productName, e.productSize, e.quantity, e.budget, e.occasion, e.deliveryDate,
    e.deliveryLocCount, e.deliveryLoc, e.specialReq, e.salesName, e.channel, e.reference, e.submittedAt
  ].map(v => '"' + String(v||'').replace(/"/g,'""') + '"'));
  const csv = [headers.map(h=>'"'+h+'"').join(','), ...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'BCL_Institutional_Enquiries_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
}

init();
</script>
