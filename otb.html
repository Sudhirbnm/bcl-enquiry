<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brand Concepts — OTB Planning Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;--bg4:#232840;--bd:#2a3050;--text:#e8eaf0;--t2:#8b90a8;--t3:#555b78;--blue:#4f8ef7;--green:#3ecf8e;--amber:#f5a623;--red:#e8505b;--purple:#a78bfa}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px}
/* TOPBAR */
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:9px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:99;flex-wrap:wrap}
.logo{font-size:12px;font-weight:700;color:var(--t2);letter-spacing:.09em;text-transform:uppercase;padding-right:12px;border-right:1px solid var(--bd)}
.logo span{color:var(--blue)}
.htitle{font-size:13px;font-weight:600}.hsub{font-size:10px;color:var(--t3);margin-top:1px}
.badge{font-size:10px;padding:2px 8px;border-radius:9px;font-weight:600;background:rgba(79,142,247,.12);color:var(--blue);border:1px solid rgba(79,142,247,.2)}
/* PAGE TABS */
.page-tabs{display:flex;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;overflow:hidden;flex-shrink:0}
.page-tabs button{border:none;background:transparent;color:var(--t3);font-size:11px;font-weight:600;padding:5px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;white-space:nowrap}
.page-tabs button.on{background:var(--blue);color:#fff}
/* FILTERS */
.fbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:7px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.flbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
select{background:var(--bg3);border:1px solid var(--bd);color:var(--text);font-size:11px;padding:4px 8px;border-radius:5px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
.seg{display:flex;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;overflow:hidden;flex-shrink:0}
.seg button{border:none;background:transparent;color:var(--t3);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.seg button.on{background:var(--blue);color:#fff}
/* FORMULA */
.formula{background:var(--bg3);border:1px solid var(--bd);border-left:3px solid var(--blue);border-radius:6px;padding:7px 13px;margin:8px 18px;font-size:10px;color:var(--t2);line-height:1.9}
.formula b{color:var(--amber)}
.ref{display:inline-block;width:14px;height:14px;background:var(--bg4);border-radius:2px;text-align:center;line-height:14px;font-size:8px;font-weight:700;color:var(--blue);margin-right:1px}
/* KPI */
.kpis{display:flex;gap:9px;padding:9px 18px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.kpi{flex:1;min-width:100px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:8px 11px;transition:border-color .2s}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.kpi-val{font-size:16px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.kpi-sub{font-size:10px;color:var(--t3);margin-top:2px}
.pt{height:3px;background:var(--bg4);border-radius:2px;margin-top:4px;overflow:hidden}
.pf{height:100%;border-radius:2px}
/* SCEN TILE */
.scen-tile input[type=number]{width:60px;font-size:20px;font-weight:700;font-family:'DM Mono',monospace;background:transparent;border:none;border-bottom:2px solid;color:inherit;outline:none;padding:0;-moz-appearance:textfield}
.scen-tile input[type=number]::-webkit-inner-spin-button,.scen-tile input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.pct-sym{font-size:15px;font-weight:700}
.scen-hint{font-size:9px;margin-top:2px}
.reset-lnk{font-size:9px;color:var(--t3);cursor:pointer;text-decoration:underline;margin-left:5px}
.reset-lnk:hover{color:var(--blue)}
/* TABLE */
.tbl-wrap{padding:12px 18px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1380px}
.sec-hd{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:5px 4px;border-bottom:2px solid}
.sec-jun{background:rgba(79,142,247,.07);color:var(--blue);border-color:rgba(79,142,247,.3)}
.sec-q2{background:rgba(245,166,35,.07);color:var(--amber);border-color:rgba(245,166,35,.3)}
.sec-q3{background:rgba(62,207,142,.07);color:var(--green);border-color:rgba(62,207,142,.3)}
.sec-rr{background:rgba(232,80,91,.07);color:var(--red);border-color:rgba(232,80,91,.3)}
th{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;padding:6px 7px;border-bottom:1px solid var(--bd);text-align:right;white-space:nowrap;background:var(--bg2)}
th.lft{text-align:left}
th.jun{background:rgba(79,142,247,.04)}th.q2{background:rgba(245,166,35,.04)}th.q3{background:rgba(62,207,142,.04)}th.rr{background:rgba(232,80,91,.04)}
tr.drow td{padding:7px 7px;border-bottom:1px solid var(--bd);text-align:right;font-size:11px;font-family:'DM Mono',monospace;color:var(--t2)}
tr.drow td.lft{text-align:left;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--text);font-size:12px}
tr.drow td.sub{font-size:10px;color:var(--t3);padding-left:22px}
tr.drow:hover td{background:rgba(255,255,255,.012)}
tr.drow td.jun{background:rgba(79,142,247,.022)}tr.drow td.q2{background:rgba(245,166,35,.022)}tr.drow td.q3{background:rgba(62,207,142,.022)}tr.drow td.rr{background:rgba(232,80,91,.022)}
tr.subtot td{padding:6px 7px;font-size:11px;font-family:'DM Mono',monospace;font-weight:600;color:var(--text);background:rgba(255,255,255,.02);border-bottom:2px solid var(--bd)}
tr.subtot td.lft{font-family:'DM Sans',sans-serif;font-size:12px}
tr.gtot td{padding:8px 7px;font-size:12px;font-family:'DM Mono',monospace;font-weight:700;color:var(--text);background:var(--bg3);border-top:2px solid var(--bd)}
tr.gtot td.lft{font-family:'DM Sans',sans-serif;font-size:13px}
.otb{color:var(--blue)!important;font-weight:700}
.cv{color:var(--text)!important;font-weight:600}
.rr{color:var(--red)!important;font-weight:700}
.over{color:var(--red)!important;font-size:10px}
.changed{border-left:2px solid var(--amber)!important}
.bdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;flex-shrink:0}
.pg{display:none}.pg.on{display:block}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Brand<span>C</span></div>
  <div><div class="htitle">OTB Planning Report</div><div class="hsub">Jun · Q2 · Q3 — Stock Movement · Pipeline · OTB</div></div>
  <span class="badge">Units (Qty)</span>
  <div class="page-tabs">
    <button id="pg1-btn" class="on" onclick="goPage(1)">Page 1 — Brand Summary</button>
    <button id="pg2-btn" onclick="goPage(2)">Page 2 — Brand × Category</button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="fbar">
  <span class="flbl">Brand Remark</span>
  <select id="f-remark" onchange="render()">
    <option value="ALL">All</option>
    <option value="ACTIVE">Active</option>
    <option value="TRADING BRAND">Trading Brand</option>
    <option value="OTHER">Other</option>
  </select>
  <span class="flbl">Stock Channel</span>
  <select id="f-channel" onchange="render()">
    <option value="ALL">All Channels</option>
    <option value="ONLINE">Online</option>
    <option value="OFFLINE">Offline</option>
    <option value="BRAND-EBO">Brand EBO</option>
    <option value="GOVT.BUSINESS">Govt Business</option>
    <option value="INSTI.">Institutional</option>
    <option value="OFF-WHITE">Off-White</option>
    <option value="OTHER">Other</option>
  </select>
  <span class="flbl" id="pg2-cat-lbl" style="display:none">Category</span>
  <select id="f-cat" onchange="render()" style="display:none">
    <option value="ALL">All Categories</option>
    <option value="LUGGAGE">Luggage</option>
    <option value="BACKPACK">Backpack</option>
    <option value="BELT">Belt</option>
    <option value="WALLET">Wallet</option>
    <option value="HANDBAG">Handbag</option>
    <option value="DUFFEL">Duffel</option>
    <option value="GIFT SET">Gift Set</option>
    <option value="APPARELS">Apparels</option>
    <option value="ACCESSORIES">Accessories</option>
    <option value="CROSS BODY">Cross Body</option>
    <option value="BUSINESS CASE">Business Case</option>
    <option value="OVERNIGHTER">Overnighter</option>
    <option value="BAGS & CASES">Bags &amp; Cases</option>
    <option value="OTHER">Other</option>
  </select>
  <span class="flbl">View</span>
  <div class="seg">
    <button id="v-sum" class="on" onclick="setView('summary')">Summary</button>
    <button id="v-det" onclick="setView('detail')">Detail (H)</button>
  </div>
  <div style="margin-left:auto;font-size:10px;color:var(--t3);background:var(--bg3);border:1px solid var(--bd);padding:3px 8px;border-radius:4px" id="filter-info">No filters active</div>
</div>

<div class="formula">
  <b>Formulas:</b>&nbsp;
  <span class="ref">D</span>A+B−C &nbsp;<span class="ref">E</span>=D &nbsp;
  <span class="ref">H</span>E+F−G* &nbsp;<span class="ref">I</span>max(0,M*−H) &nbsp;
  <span class="ref">J</span>E+F+I−G* &nbsp;<span class="ref">K</span>=J &nbsp;
  <span class="ref">L</span>Q4*−(K−M*) &nbsp;<span class="ref">N</span>K+max(0,L)−M* &nbsp;
  <span class="ref">P</span>G*÷3 &nbsp;<span class="ref">Q</span>M*÷3
  &nbsp;&nbsp;<b style="color:var(--amber)">* = scaled by scenario %</b>
</div>

<div class="kpis" id="kpis"></div>

<!-- PAGE 1: Brand Summary -->
<div class="pg on" id="pg1">
  <div class="tbl-wrap"><table id="tbl1"></table></div>
</div>

<!-- PAGE 2: Brand × Category -->
<div class="pg" id="pg2">
  <div class="tbl-wrap"><table id="tbl2"></table></div>
</div>

var q2Pct=100,q3Pct=100,q4Pct=100,curView='summary',curPage=1;

function calc(rows){
  var A=0,B=0,C=0,F=0,G=0,M=0,Q4v=0,O=0;
  rows.forEach(function(r){A+=r.A;B+=r.B;C+=r.C;F+=r.F;G+=r.G;M+=r.M;Q4v+=r.Q4;O+=r.O;});
  G =Math.round(G *q2Pct/100*10)/10;
  M =Math.round(M *q3Pct/100*10)/10;
  Q4v=Math.round(Q4v*q4Pct/100*10)/10;
  var D=Math.round((A+B-C)*10)/10;
  var E=D, H=Math.round((E+F-G)*10)/10;
  var I=Math.round(Math.max(0,M-H)*10)/10;
  var J=Math.round((E+F+I-G)*10)/10, K=J;
  var L=Math.round((Q4v-(K-M))*10)/10;
  var Lotb=Math.max(0,L);
  var N=Math.round((K+Lotb-M)*10)/10;
  var P=Math.round(G/3), Q=Math.round(M/3);
  return {A:A,B:B,C:C,D:D,E:E,F:F,G:G,H:H,I:I,J:J,K:K,L:L,Lotb:Lotb,M:M,N:N,O:Math.round(O),P:P,Q:Q};
}

function filtered(){
  var rem=document.getElementById('f-remark').value;
  var ch =document.getElementById('f-channel').value;
  var cat=document.getElementById('f-cat').value;
  return RAW.filter(function(r){
    if(rem!=='ALL'&&r.br!==rem) return false;
    if(ch !=='ALL'&&r.ch!==ch)  return false;
    if(cat!=='ALL'&&r.cat!==cat) return false;
    return true;
  });
}

function n(v){return v===0?'<span style="color:var(--t3)">—</span>':Math.round(v).toLocaleString();}
function nc(v){return '<span class="cv">'+Math.round(v).toLocaleString()+'</span>';}
function notb(lotb,lraw){
  if(lraw<0) return '<span class="over">Over '+Math.abs(Math.round(lraw)).toLocaleString()+'</span>';
  if(lotb<=0) return '<span style="color:var(--t3)">—</span>';
  return '<span class="otb">'+Math.round(lotb).toLocaleString()+'</span>';
}
function nrr(v){return v<=0?'<span style="color:var(--t3)">—</span>':'<span class="rr">'+Math.round(v).toLocaleString()+'</span>';}
function nscen(v,base){
  if(Math.abs(v-base)<0.5) return Math.round(v).toLocaleString();
  var diff=Math.round(v-base);
  return '<b style="color:'+(diff>0?'var(--green)':'var(--amber)')+'">'+Math.round(v).toLocaleString()+'</b><span style="font-size:9px;color:'+(diff>0?'var(--green)':'var(--amber)')+'">'+(diff>0?'+':'')+diff+'</span>';
}

function scenTile(id,lbl,sub,pct,col,which){
  var ch=pct!==100,bord=ch?(pct<100?'var(--amber)':'var(--green)'):'var(--bd)';
  return '<div class="kpi scen-tile" style="border-color:'+bord+';min-width:100px">'
    +'<div class="kpi-lbl">'+lbl+'<span class="reset-lnk" onclick="resetScen(\''+which+'\')">reset</span></div>'
    +'<div style="display:flex;align-items:baseline;gap:3px">'

    +' oninput="handleInput(this,\''+which+'\')" onkeydown="handleKey(event,this,\''+which+'\')" onfocus="this.select()">'
    +'<span class="pct-sym" style="color:'+col+'">%</span>'

    +'<div class="scen-hint" style="color:'+bord+'">'+(ch?(pct<100?'▼ Under plan':'▲ Above plan'):'Type or ↑↓ keys')+'</div>'

// ── INPUT HANDLERS ──
function handleInput(el,which){
  var raw=el.value;
  var v=parseInt(raw);
  if(isNaN(v)) return;
  if(raw.length<2) return;
  if(v<50) return;
  if(v>130) v=130;
  el.value=v;
  setScen(which,v);
}
function handleKey(e,el,which){
  if(e.key==='ArrowUp'){e.preventDefault();var v=Math.min((parseInt(el.value)||100)+5,130);el.value=v;setScen(which,v);}
  else if(e.key==='ArrowDown'){e.preventDefault();var v=Math.max((parseInt(el.value)||100)-5,50);el.value=v;setScen(which,v);}
  else if(e.key==='Enter'){e.preventDefault();var v=Math.min(Math.max(parseInt(el.value)||100,50),130);el.value=v;setScen(which,v);}
  else if(e.key==='Escape'){e.preventDefault();resetScen(which);}
}
function setScen(which,v){
  if(which==='q2') q2Pct=v;
  else if(which==='q3') q3Pct=v;
  else q4Pct=v;
  render();
}
function resetScen(which){
  if(which==='q2') q2Pct=100;
  else if(which==='q3') q3Pct=100;
  else q4Pct=100;
  render();
  var ids={q2:'kpi-q2-inp',q3:'kpi-q3-inp',q4:'kpi-q4-inp'};
  var el=document.getElementById(ids[which]);
  if(el) el.value=100;
}
function setView(v){
  curView=v;
  document.getElementById('v-sum').className=v==='summary'?'on':'';
  document.getElementById('v-det').className=v==='detail'?'on':'';
  render();
}
function goPage(p){
  curPage=p;
  document.getElementById('pg1-btn').className=p===1?'on':'';
  document.getElementById('pg2-btn').className=p===2?'on':'';
  document.getElementById('pg1').className=p===1?'pg on':'pg';
  document.getElementById('pg2').className=p===2?'pg on':'pg';
  document.getElementById('pg2-cat-lbl').style.display=p===2?'':'none';
  document.getElementById('f-cat').style.display=p===2?'':'none';
  render();
}

render();
</script>
</body>
</html>
